<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebhookForge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0:#0d0e11;--bg-1:#13151a;--bg-2:#1a1d26;--surface:#1e2030;--surface2:#262a3f;
    --blurple:#5865f2;--blurple-glow:rgba(88,101,242,0.35);
    --green:#57f287;--red:#ed4245;
    --text:#e8eaf0;--text-muted:#7a8099;--text-dim:#4a4f6a;
    --border:rgba(255,255,255,0.07);--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg-0);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 20%,rgba(88,101,242,0.12) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 85% 80%,rgba(87,242,135,0.06) 0%,transparent 55%);pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:40px 24px 80px}
  header{display:flex;align-items:center;gap:16px;margin-bottom:48px;animation:fadeDown .6s ease both}
  .logo{width:48px;height:48px;background:var(--blurple);border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px var(--blurple-glow);flex-shrink:0}
  .logo svg{width:28px;height:28px;fill:white}
  .logo-text h1{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1}
  .logo-text span{font-size:12px;color:var(--text-muted);font-weight:400}
  .status-bar{display:flex;gap:10px;margin-left:auto;align-items:center}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease infinite}
  .status-text{font-size:12px;color:var(--green);font-family:'JetBrains Mono',monospace}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;margin-bottom:18px;animation:fadeUp .5s ease both;position:relative;overflow:hidden}
  .section::before{content:'';position:absolute;top:0;left:24px;right:24px;height:1px;background:linear-gradient(90deg,transparent,rgba(88,101,242,.5),transparent)}
  .section:nth-child(1){animation-delay:.1s}.section:nth-child(2){animation-delay:.2s}.section:nth-child(3){animation-delay:.3s}.section:nth-child(4){animation-delay:.4s}
  .section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blurple);margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
  label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px}
  input[type=text],input[type=url],textarea{width:100%;background:var(--bg-1);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:12px 16px;outline:none;transition:border-color .2s,box-shadow .2s;resize:none}
  input:focus,textarea:focus{border-color:var(--blurple);box-shadow:0 0 0 3px rgba(88,101,242,.15)}
  input::placeholder,textarea::placeholder{color:var(--text-dim)}
  .input-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .input-group{margin-bottom:16px}.input-group:last-child{margin-bottom:0}
  .webhook-wrap{display:flex;gap:10px}.webhook-wrap input{flex:1}
  .btn-sm{background:var(--bg-2);border:1.5px solid var(--border);color:var(--text-muted);border-radius:var(--radius);padding:0 16px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
  .btn-sm:hover{border-color:var(--blurple);color:var(--blurple)}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .toggle-row:last-child{border-bottom:none;padding-bottom:0}.toggle-row:first-child{padding-top:0}
  .toggle-info strong{display:block;font-size:14px;font-weight:600;margin-bottom:2px}
  .toggle-info span{font-size:12px;color:var(--text-muted)}
  .toggle{width:44px;height:24px;background:var(--bg-0);border-radius:12px;position:relative;transition:background .3s;flex-shrink:0;border:1.5px solid var(--border)}
  .toggle.on{background:var(--blurple);border-color:var(--blurple)}
  .toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:white;border-radius:50%;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .toggle.on::after{transform:translateX(20px)}
  .embed-extra{display:none;flex-direction:column;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
  .embed-extra.open{display:flex}
  .color-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .swatch{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;position:relative}
  .swatch:hover{transform:scale(1.15)}.swatch.on{border-color:white;transform:scale(1.1)}
  .swatch.custom{background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);overflow:hidden}
  .swatch.custom input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;padding:0;border:none}
  .field-row{display:grid;grid-template-columns:1fr 2fr auto;gap:10px;align-items:center;margin-bottom:10px}
  .del-btn{background:none;border:1.5px solid var(--border);color:var(--red);border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
  .del-btn:hover{background:rgba(237,66,69,.12);border-color:var(--red)}
  .add-btn{background:none;border:1.5px dashed var(--text-dim);border-radius:var(--radius);color:var(--text-muted);padding:10px;width:100%;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
  .add-btn:hover{border-color:var(--blurple);color:var(--blurple);background:rgba(88,101,242,.06)}
  /* Preview */
  .preview-bg{background:var(--bg-1);border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
  .prev-label{font-size:11px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
  .prev-msg{display:flex;gap:12px}
  .prev-avatar{width:40px;height:40px;border-radius:50%;background:var(--blurple);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
  .prev-body{flex:1;min-width:0}
  .prev-name{font-size:15px;font-weight:700;color:white;margin-bottom:4px}
  .bot-tag{background:var(--blurple);font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:6px;font-family:'JetBrains Mono',monospace;vertical-align:middle}
  .prev-text{font-size:14px;line-height:1.6;color:#dcddde;white-space:pre-wrap;word-break:break-word}
  .prev-embed{margin-top:8px;display:none;border-radius:4px;overflow:hidden;background:#2b2d31;max-width:480px}
  .prev-embed.open{display:flex}
  .embed-bar{width:4px;flex-shrink:0}
  .embed-cnt{padding:12px 16px;flex:1;min-width:0}
  .embed-cnt .ea{font-size:12px;font-weight:600;color:#dcddde;margin-bottom:4px}
  .embed-cnt .et{font-size:15px;font-weight:700;color:white;margin-bottom:4px}
  .embed-cnt .ed{font-size:13px;color:#b5bac1;line-height:1.5}
  .embed-fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .ef strong{display:block;font-size:12px;font-weight:700;color:#dcddde;margin-bottom:2px}
  .ef span{font-size:12px;color:#b5bac1}
  /* Send */
  .send-bar{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px 28px;display:flex;align-items:center;gap:20px;margin-bottom:18px;animation:fadeUp .5s ease .5s both;position:relative;overflow:hidden}
  .send-bar::before{content:'';position:absolute;top:0;left:24px;right:24px;height:1px;background:linear-gradient(90deg,transparent,rgba(88,101,242,.5),transparent)}
  .send-info{flex:1}.send-info strong{display:block;font-size:15px;font-weight:700;margin-bottom:3px}
  .send-info span{font-size:12px;color:var(--text-muted)}
  .btn-send{background:var(--blurple);border:none;color:white;border-radius:var(--radius);padding:14px 32px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 24px rgba(88,101,242,.4);letter-spacing:.3px;min-width:140px}
  .btn-send:hover{background:#4752c4;transform:translateY(-1px);box-shadow:0 8px 32px rgba(88,101,242,.5)}
  .btn-send:active{transform:translateY(0)}
  .btn-send:disabled{opacity:.6;pointer-events:none}
  /* History */
  .hist-list{display:flex;flex-direction:column;gap:8px}
  .hist-item{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:14px;font-size:13px}
  .hdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .hdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}.hdot.err{background:var(--red)}
  .hmsg{color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .htime{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-left:auto;flex-shrink:0}
  .empty{text-align:center;padding:20px;color:var(--text-dim);font-size:13px}
  /* Toast */
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 24px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;z-index:999;transition:transform .35s cubic-bezier(.17,.67,.35,1.2);box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.ok{border-color:rgba(87,242,135,.3)}.toast.err{border-color:rgba(237,66,69,.3)}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-0)}::-webkit-scrollbar-thumb{background:#22263a;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--blurple)}
  @media(max-width:600px){.input-row{grid-template-columns:1fr}.send-bar{flex-direction:column;text-align:center}.btn-send{width:100%}}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.054a19.92 19.92 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 13.93 13.93 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    </div>
    <div class="logo-text"><h1>WebhookForge</h1><span>Discord Webhook Manager</span></div>
    <div class="status-bar"><div class="status-dot"></div><span class="status-text">ONLINE</span></div>
  </header>

  <!-- Webhook URL -->
  <div class="section">
    <div class="section-label">🔗 Webhook</div>
    <div class="input-group">
      <label>URL Webhooka</label>
      <div class="webhook-wrap">
        <input type="url" id="wUrl" placeholder="https://discord.com/api/webhooks/ID/TOKEN">
        <button class="btn-sm" onclick="testUrl()">Sprawdź</button>
      </div>
    </div>
    <div class="input-row">
      <div class="input-group" style="margin:0"><label>Nazwa bota</label><input type="text" id="wName" placeholder="Mój Bot" oninput="rp()"></div>
      <div class="input-group" style="margin:0"><label>Avatar URL</label><input type="url" id="wAvatar" placeholder="https://..."></div>
    </div>
  </div>

  <!-- Message -->
  <div class="section">
    <div class="section-label">✉️ Wiadomość</div>
    <div class="input-group"><label>Treść</label><textarea id="wContent" rows="4" placeholder="Treść wiadomości..." oninput="rp()"></textarea></div>
    <div class="input-group" style="margin:0"><label>Wzmianka</label><input type="text" id="wMention" placeholder="@everyone / @here" oninput="rp()"></div>
  </div>

  <!-- Embed -->
  <div class="section">
    <div class="section-label">🎨 Embed</div>
    <div class="toggle-row" onclick="tog('embedOn','embedExtra')">
      <div class="toggle-info"><strong>Włącz embed</strong><span>Bogaty blok z tytułem, opisem i polami</span></div>
      <div class="toggle" id="embedOn"></div>
    </div>
    <div class="embed-extra" id="embedExtra">
      <div class="input-row" style="margin:0">
        <div class="input-group" style="margin:0"><label>Tytuł</label><input type="text" id="eTitle" placeholder="Tytuł" oninput="rp()"></div>
        <div class="input-group" style="margin:0"><label>Autor</label><input type="text" id="eAuthor" placeholder="Autor" oninput="rp()"></div>
      </div>
      <div class="input-group"><label>Opis</label><textarea id="eDesc" rows="3" placeholder="Opis embeda..." oninput="rp()"></textarea></div>
      <div class="input-group"><label>URL tytułu</label><input type="url" id="eUrl" placeholder="https://..."></div>
      <div class="input-group">
        <label>Kolor paska</label>
        <div class="color-row">
          <div class="swatch on" style="background:#5865f2" data-c="#5865f2" onclick="sc(this)"></div>
          <div class="swatch" style="background:#57f287" data-c="#57f287" onclick="sc(this)"></div>
          <div class="swatch" style="background:#fee75c" data-c="#fee75c" onclick="sc(this)"></div>
          <div class="swatch" style="background:#ed4245" data-c="#ed4245" onclick="sc(this)"></div>
          <div class="swatch" style="background:#eb459e" data-c="#eb459e" onclick="sc(this)"></div>
          <div class="swatch" style="background:#ffffff" data-c="#ffffff" onclick="sc(this)"></div>
          <div class="swatch custom"><input type="color" value="#5865f2" oninput="scc(this)"></div>
        </div>
      </div>
      <div>
        <label>Pola (Fields)</label>
        <div id="fieldsWrap"></div>
        <button class="add-btn" onclick="addField()">+ Dodaj pole</button>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div class="section">
    <div class="section-label">👁️ Podgląd</div>
    <div class="preview-bg">
      <div class="prev-label">DISCORD PREVIEW</div>
      <div class="prev-msg">
        <div class="prev-avatar" id="pAvatar">W</div>
        <div class="prev-body">
          <div class="prev-name" id="pName">WebhookForge <span class="bot-tag">BOT</span></div>
          <div class="prev-text" id="pText">Twoja wiadomość pojawi się tutaj...</div>
          <div class="prev-embed" id="pEmbed">
            <div class="embed-bar" id="pBar" style="background:#5865f2"></div>
            <div class="embed-cnt">
              <div class="ea" id="pEA"></div>
              <div class="et" id="pET"></div>
              <div class="ed" id="pED"></div>
              <div class="embed-fgrid" id="pEF"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Send -->
  <div class="send-bar">
    <div class="send-info"><strong>Wyślij wiadomość</strong><span>Wysyłane bezpośrednio do Discord API</span></div>
    <button class="btn-send" id="btnSend" onclick="send()">Wyślij ➤</button>
  </div>

  <!-- History -->
  <div class="section">
    <div class="section-label">📋 Historia</div>
    <div class="hist-list" id="histList"><div class="empty">Brak historii</div></div>
  </div>

</div>

<div class="toast" id="toast"><span id="tIco">✅</span><span id="tMsg"></span></div>

<script>
let embedOn = false;
let color = '#5865f2';
let fc = 0;
const hist = [];

/* Toggle */
function tog(toggleId, extraId) {
  embedOn = !embedOn;
  document.getElementById(toggleId).classList.toggle('on', embedOn);
  document.getElementById(extraId).classList.toggle('open', embedOn);
  rp();
}

/* Color swatches */
function sc(el) {
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on'));
  el.classList.add('on'); color = el.dataset.c; rp();
}
function scc(el) {
  color = el.value;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on'));
  el.closest('.swatch').classList.add('on'); rp();
}

/* Fields */
function addField() {
  const id = ++fc;
  const w = document.getElementById('fieldsWrap');
  const d = document.createElement('div');
  d.className='field-row'; d.id='fr'+id;
  d.innerHTML=`<input type="text" placeholder="Nazwa" oninput="rp()"><input type="text" placeholder="Wartość" oninput="rp()"><button class="del-btn" onclick="document.getElementById('fr${id}').remove();rp()">×</button>`;
  w.appendChild(d); rp();
}

/* Render preview */
function rp() {
  const name = document.getElementById('wName').value || 'WebhookForge';
  const content = document.getElementById('wContent').value;
  const mention = document.getElementById('wMention').value;
  document.getElementById('pAvatar').textContent = name[0].toUpperCase();
  document.getElementById('pName').innerHTML = `${name} <span class="bot-tag">BOT</span>`;
  document.getElementById('pText').textContent = (mention?mention+' ':'')+( content||'Twoja wiadomość pojawi się tutaj...');
  const pe = document.getElementById('pEmbed');
  if (embedOn) {
    pe.classList.add('open');
    document.getElementById('pBar').style.background = color;
    document.getElementById('pEA').textContent = document.getElementById('eAuthor').value;
    document.getElementById('pET').textContent = document.getElementById('eTitle').value;
    document.getElementById('pED').textContent = document.getElementById('eDesc').value;
    const fg = document.getElementById('pEF'); fg.innerHTML='';
    document.querySelectorAll('#fieldsWrap .field-row').forEach(r=>{
      const ins=r.querySelectorAll('input');
      if(ins[0].value||ins[1].value){
        const d=document.createElement('div');d.className='ef';
        d.innerHTML=`<strong>${ins[0].value||'Pole'}</strong><span>${ins[1].value||''}</span>`;
        fg.appendChild(d);
      }
    });
  } else { pe.classList.remove('open'); }
}

/* Test URL */
function testUrl() {
  const u = document.getElementById('wUrl').value.trim();
  if (!u) { toast('Wklej URL webhooka!', false); return; }
  const re = /^https:\/\/discord\.com\/api\/webhooks\/\d+\/.+/;
  if (!re.test(u)) { toast('URL ma niepoprawny format!', false); return; }
  toast('Format URL wygląda poprawnie ✓', true);
}

/* SEND */
async function send() {
  const rawUrl = document.getElementById('wUrl').value.trim();
  if (!rawUrl) { toast('Wklej URL webhooka!', false); return; }

  const content = document.getElementById('wContent').value;
  const mention = document.getElementById('wMention').value;
  const name    = document.getElementById('wName').value || 'WebhookForge';
  const avatar  = document.getElementById('wAvatar').value;
  const fullContent = (mention ? mention+' ' : '') + content;

  if (!fullContent.trim() && !embedOn) { toast('Wiadomość jest pusta!', false); return; }

  // Build payload
  const payload = { username: name };
  if (fullContent.trim()) payload.content = fullContent;
  if (avatar) payload.avatar_url = avatar;

  if (embedOn) {
    const fields = [];
    document.querySelectorAll('#fieldsWrap .field-row').forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value || ins[1].value)
        fields.push({ name: ins[0].value||'\u200b', value: ins[1].value||'\u200b', inline: true });
    });
    const embed = { color: parseInt(color.replace('#',''), 16) };
    const a = document.getElementById('eAuthor').value;
    const t = document.getElementById('eTitle').value;
    const d = document.getElementById('eDesc').value;
    const u = document.getElementById('eUrl').value;
    if (a) embed.author = { name: a };
    if (t) embed.title = t;
    if (d) embed.description = d;
    if (u) embed.url = u;
    if (fields.length) embed.fields = fields;
    payload.embeds = [embed];
  }

  const btn = document.getElementById('btnSend');
  btn.disabled = true; btn.textContent = 'Wysyłanie...';

  // Use multipart/form-data with payload_json — avoids CORS preflight
  const fd = new FormData();
  fd.append('payload_json', JSON.stringify(payload));

  try {
    // Clean URL: strip trailing slash, add ?wait=true
    const url = rawUrl.replace(/\/+$/, '') + '?wait=true';
    const res = await fetch(url, { method: 'POST', body: fd });

    let data = {};
    try { data = await res.json(); } catch(_) {}

    if (res.ok) {
      toast('Wysłano! 🚀', true);
      addHist(content || '[embed]', true, res.status);
    } else {
      const msg = data.message || data.error || res.status;
      toast('Błąd Discord: ' + msg, false);
      addHist(content || '[embed]', false, res.status);
      console.error('Discord error response:', data);
    }
  } catch(e) {
    toast('Błąd sieci: ' + e.message, false);
    addHist(content || '[embed]', false, 'ERR');
  }

  btn.disabled = false; btn.textContent = 'Wyślij ➤';
}

function addHist(msg, ok, code) {
  const t = new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  hist.unshift({msg,ok,code,t});
  const l = document.getElementById('histList');
  l.innerHTML = hist.slice(0,10).map(h=>`
    <div class="hist-item">
      <div class="hdot ${h.ok?'ok':'err'}"></div>
      <span style="font-size:12px;color:${h.ok?'var(--green)':'var(--red)'}">${h.code}</span>
      <span class="hmsg">${h.msg}</span>
      <span class="htime">${h.t}</span>
    </div>`).join('');
}

function toast(msg, ok) {
  const el = document.getElementById('toast');
  document.getElementById('tIco').textContent = ok ? '✅' : '❌';
  document.getElementById('tMsg').textContent = msg;
  el.className = 'toast show ' + (ok?'ok':'err');
  setTimeout(()=>el.className='toast '+(ok?'ok':'err'), 3500);
}

rp();
</script>
